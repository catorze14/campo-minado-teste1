<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Bet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel">
            <div class="header-stat">
                <span class="label">Saldo</span>
                <span class="value" id="balanceDisplay">$100.00</span>
            </div>
            <div class="header-title">
                <h1>MINESWEEPER <span class="highlight">BET</span></h1>
            </div>
            <div class="header-stat">
                <span class="label">Tempo</span>
                <span class="value" id="timerDisplay">00:00</span>
            </div>
        </header>

        <!-- Configuration Panel -->
        <div class="controls glass-panel">
            <div class="input-group">
                <label for="difficultySelect">Dificuldade</label>
                <select id="difficultySelect">
                    <option value="easy">Fácil (9x9)</option>
                    <option value="medium">Médio (16x16)</option>
                    <option value="hard">Difícil (30x16)</option>
                </select>
            </div>
            <div class="input-group">
                <label for="timeSelect">Tempo & Odds</label>
                <select id="timeSelect">
                    <!-- Preenchido via JS -->
                </select>
            </div>
            <div class="input-group">
                <label for="betInput">Aposta ($)</label>
                <input type="number" id="betInput" min="1" step="1" value="10">
            </div>
            <button class="btn btn-primary" id="startBtn">▶ Apostar & Jogar</button>
        </div>

        <!-- Game Area -->
        <main class="game-area glass-panel">
            <div id="boardContainer" class="board-container">
                <!-- Grid renderizado aqui -->
            </div>
            <!-- Overlay for unstarted state -->
            <div id="gameOverlay" class="overlay active">
                <p>Faça sua aposta para começar!</p>
            </div>
        </main>
    </div>

    <!-- Result Modal -->
    <div id="resultModal" class="modal">
        <div class="modal-content glass-panel">
            <h2 id="modalTitle">Resultado</h2>
            <p id="modalMessage">Você ganhou!</p>
            <button class="btn btn-primary" id="modalBtn">Ok</button>
        </div>
    </div>

    <!-- Game Over Real Modal -->
    <div id="gameOverModal" class="modal">
        <div class="modal-content glass-panel error">
            <h2>FALÊNCIA!</h2>
            <p>Seu saldo acabou e você não pode mais apostar.</p>
            <button class="btn btn-danger" id="restartBtn">Recomeçar da Estaca Zero ($100)</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
